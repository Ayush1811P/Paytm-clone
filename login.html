<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAYMONEY - Login</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div class="logo">
        <h1>PAY<span>MONEY</span></h1>
      </div>
      
      <div class="form-container">
        <h2>Login to your account</h2>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="loginId">Email or Phone Number</label>
            <input type="text" id="loginId" required placeholder="Enter your email or phone">
          </div>
          
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required placeholder="Enter your password">
            <div class="password-toggle">
              <input type="checkbox" id="showPassword">
              <label for="showPassword">Show Password</label>
            </div>
          </div>
          
          <div class="form-group forgot-password">
            <a href="#" id="forgotPassword">Forgot Password?</a>
          </div>
          
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Register Now</a></p>
        </div>
      </div>
    </div>
  </div>

  <div id="notification" class="notification"></div>
  
  <div id="forgotPasswordModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Reset Your Password</h2>
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="resetEmail">Email Address</label>
          <input type="email" id="resetEmail" required placeholder="Enter your registered email">
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
